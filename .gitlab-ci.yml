stages:
  - test
  - lint
  - build
  - deploy

variables:
  GO_VERSION: "1.25"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go test ./...
  only:
    - branches

lint:
  stage: lint
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run
  only:
    - branches

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - branches

deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying scraper to AWS ECS..."
    - echo "aws ecs update-service --cluster production --service scraper-service --force-new-deployment"
  only:
    - main